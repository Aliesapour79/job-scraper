name: Job Scraper - Daily Run

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-jobs:
    name: Scrape Job Postings
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: |
          python job_scraper.py
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: job-matches-json
          path: job_matches_*.json
          retention-days: 30
      
      - name: Send success to Telegram
        if: success() && secrets.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
import requests
import glob
import os
import json
import datetime
TOKEN = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
CHAT_ID = '${{ secrets.TELEGRAM_CHAT_ID }}'
files = glob.glob('job_matches_*.json')
if files:
    for f in files:
        with open(f, 'rb') as file:
            res = requests.post(
                f'https://api.telegram.org/bot{TOKEN}/sendDocument',
                data={'chat_id': CHAT_ID, 'caption': f'✅ اسکرپینگ انجام شد! {datetime.datetime.now().strftime(\"%Y/%m/%d %H:%M\")}'},
                files={'document': file}
            )
    print(f'✅ {len(files)} فایل به تلگرام ارسال شد.')
else:
    print('⚠️ هیچ فایلی پیدا نشد!')
"
      
      - name: Send error to Telegram
        if: failure() && secrets.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
import requests
import datetime
TOKEN = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
CHAT_ID = '${{ secrets.TELEGRAM_CHAT_ID }}'
msg = f'❌ اسکرپینگ در تاریخ {datetime.datetime.now().strftime(\"%Y/%m/%d %H:%M\")} با خطا مواجه شد!'
requests.post(
    f'https://api.telegram.org/bot{TOKEN}/sendMessage',
    data={'chat_id': CHAT_ID, 'text': msg}
)
"

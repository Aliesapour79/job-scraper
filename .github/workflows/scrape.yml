name: Job Scraper - Daily Run

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-jobs:
    name: Scrape Job Postings
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: |
          python job_scraper.py
      
      - name: Convert JSON to HTML
        run: |
          python json_to_html.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-matches
          path: |
            job_matches_*.json
            job_matches_*_report.html
          retention-days: 30
      
      - name: Send results to Telegram
        if: success()
        run: |
          python -c '
          import requests
          import glob
          import datetime
          import os
          TOKEN = "'"${{ secrets.TELEGRAM_BOT_TOKEN }}"'"
          CHAT_ID = "'"${{ secrets.TELEGRAM_CHAT_ID }}"'"
          if TOKEN != "" and CHAT_ID != "":
              files = glob.glob("job_matches_*_report.html")
              if files:
                  for f in files:
                      with open(f, "rb") as file:
                          now = datetime.datetime.now().strftime("%Y/%m/%d %H:%M")
                          caption = f"📊 گزارش اسکرپینگ {now}"
                          requests.post(
                              f"https://api.telegram.org/bot{TOKEN}/sendDocument",
                              data={"chat_id": CHAT_ID, "caption": caption},
                              files={"document": file}
                          )
                  print("✅ فایل HTML به تلگرام ارسال شد.")
              else:
                  print("⚠️ هیچ فایل HTML پیدا نشد!")
          else:
              print("⚠️ توکن یا آیدی تلگرام تنظیم نشده است!")
          '
      
      - name: Send error to Telegram
        if: failure()
        run: |
          python -c '
          import requests
          import datetime
          import os
          TOKEN = "'"${{ secrets.TELEGRAM_BOT_TOKEN }}"'"
          CHAT_ID = "'"${{ secrets.TELEGRAM_CHAT_ID }}"'"
          if TOKEN != "" and CHAT_ID != "":
              now = datetime.datetime.now().strftime("%Y/%m/%d %H:%M")
              msg = f"❌ اسکرپینگ در تاریخ {now} با خطا مواجه شد!"
              requests.post(
                  f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                  data={"chat_id": CHAT_ID, "text": msg}
              )
              print("✅ پیام خطا به تلگرام ارسال شد.")
          else:
              print("⚠️ توکن یا آیدی تلگرام تنظیم نشده است!")
          '

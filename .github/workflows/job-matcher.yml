name: Run Job Scraper

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache HuggingFace models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - Check encryption
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "ENCRYPTION_KEY is set: ${#ENCRYPTION_KEY}"
          echo "Checking config files..."
          ls -la config/
          echo "First 100 chars of settings.py.enc:"
          cat config/settings.py.enc | head -c 100
          echo ""

      # ==========================================
      # 🔐 رمزگشایی فایل‌ها قبل از اجرا
      # ==========================================
      - name: Decrypt files
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python decrypt_files.py

      - name: Run main.py
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python main.py

      - name: Upload results (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: job-matches
          path: |
            output/job_matches_v7_*.json
            output/job_report_v7_*.html
            data/jobs.db
            partial/partial_*.json
          retention-days: 30

      # ==========================================
      # 🔐 رمزنگاری دیتابیس و Commit به ریپازیتوری
      # ==========================================
      - name: Encrypt database and commit
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          # رمزنگاری دیتابیس (با استفاده از کلید)
          python -c "
          from cryptography.fernet import Fernet
          import os

          key = os.environ.get('ENCRYPTION_KEY')
          if not key:
              print('❌ ENCRYPTION_KEY not found!')
              exit(1)

          cipher = Fernet(key.encode())

          db_path = 'data/jobs.db'
          if os.path.exists(db_path):
              with open(db_path, 'rb') as f:
                  data = f.read()
              encrypted = cipher.encrypt(data)
              with open('data/jobs.db.enc', 'wb') as f:
                  f.write(encrypted)
              print('✅ Database encrypted successfully!')
          else:
              print('⚠️ jobs.db not found, skipping encryption')
          "

          # Commit و Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db.enc
          git commit -m "Auto-update encrypted database [skip ci]" || echo "No changes to commit"
          git push
name: Run Job Scraper

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # Chrome
      # ==========================================
      - name: Setup Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version

      # ==========================================
      # Python
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==========================================
      # Cache pip
      # ==========================================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ==========================================
      # Cache HuggingFace
      # ==========================================
      - name: Cache HuggingFace
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      # ==========================================
      # Install
      # ==========================================
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==========================================
      # Debug
      # ==========================================
      - name: Debug Encryption
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "Key length = ${#ENCRYPTION_KEY}"
          ls -la config
          ls -la data
          ls -la cache || true

      # ==========================================
      # Decrypt Cache
      # ==========================================
      - name: Decrypt Cache
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python << 'EOF'
          from cryptography.fernet import Fernet
          import os

          key = os.environ["ENCRYPTION_KEY"]
          cipher = Fernet(key.encode())

          os.makedirs("cache", exist_ok=True)

          for file in os.listdir("cache"):
              if not file.endswith(".enc"):
                  continue

              enc = os.path.join("cache", file)
              dec_name = file.replace(".enc", "")
              dec = os.path.join("cache", dec_name)

              with open(enc, "rb") as f:
                  encrypted = f.read()

              decrypted = cipher.decrypt(encrypted)

              with open(dec, "wb") as f:
                  f.write(decrypted)

              print(f"✅ {file} -> {dec_name}")

          print("✅ Cache decrypted")
          EOF

      # ==========================================
      # Decrypt Config
      # ==========================================
      - name: Decrypt Config
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python decrypt_files.py

      # ==========================================
      # Decrypt Database
      # ==========================================
      - name: Decrypt Database
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python << 'EOF'
          from cryptography.fernet import Fernet
          import os

          key = os.environ["ENCRYPTION_KEY"]
          cipher = Fernet(key.encode())

          enc_db = "data/jobs.db.enc"
          db = "data/jobs.db"

          if os.path.exists(enc_db):

              with open(enc_db, "rb") as f:
                  encrypted = f.read()

              decrypted = cipher.decrypt(encrypted)

              with open(db, "wb") as f:
                  f.write(decrypted)

              print("✅ Database decrypted")

          else:
              print("⚠️ jobs.db.enc not found")
          EOF

      # ==========================================
      # Run Main
      # ==========================================
      - name: Run Scraper
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python main.py

      # ==========================================
      # Upload Artifacts
      # ==========================================
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: job-results
          path: |
            output/
            partial/
            data/jobs.db
          retention-days: 30

      # ==========================================
      # Encrypt Database
      # ==========================================
      - name: Encrypt Database
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          python << 'EOF'
          from cryptography.fernet import Fernet
          import os

          key = os.environ["ENCRYPTION_KEY"]
          cipher = Fernet(key.encode())

          db = "data/jobs.db"

          if os.path.exists(db):

              with open(db, "rb") as f:
                  raw = f.read()

              encrypted = cipher.encrypt(raw)

              with open("data/jobs.db.enc", "wb") as f:
                  f.write(encrypted)

              print("✅ Database encrypted")

          else:
              print("⚠️ jobs.db not found")
          EOF

      # ==========================================
      # Commit
      # ==========================================
      - name: Commit Updated Database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/jobs.db.enc

          git diff --cached --quiet || git commit -m "Auto update encrypted database [skip ci]"

          git push

name: Job Matcher - Daily Run

on:
  schedule:
    - cron: '0 0 */3 * *'   # هر ۳ روز یکبار ساعت ۰۰:۰۰
  workflow_dispatch:
jobs:
  job-matcher:
    name: Match Jobs with Resume (Multi-Site)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache HuggingFace models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run job matcher (Multi-Site)
        run: |
          python main.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-matches
          path: |
            output/job_matches_v7_*.json
            output/job_report_v7_*.html
            data/jobs.db 
            output/partial_*.json
          retention-days: 30
      
      - name: Send results to Telegram
        if: success()
        run: |
          python -c '
          import requests
          import glob
          import datetime
          import os
          TOKEN = "'"${{ secrets.TELEGRAM_BOT_TOKEN }}"'"
          CHAT_ID = "'"${{ secrets.TELEGRAM_CHAT_ID }}"'"
          if TOKEN != "" and CHAT_ID != "":
              files = glob.glob("output/job_report_v7_*.html")
              if files:
                  for f in files:
                      with open(f, "rb") as file:
                          now = datetime.datetime.now().strftime("%Y/%m/%d %H:%M")
                          caption = f"📊 گزارش تطبیق شغلی v7 (Multi-Site: e-estekhdam + Jobvision) - {now}"
                          requests.post(
                              f"https://api.telegram.org/bot{TOKEN}/sendDocument",
                              data={"chat_id": CHAT_ID, "caption": caption},
                              files={"document": file}
                          )
                  print("✅ فایل HTML به تلگرام ارسال شد.")
              else:
                  print("⚠️ هیچ فایل HTML پیدا نشد!")
          else:
              print("⚠️ توکن یا آیدی تلگرام تنظیم نشده است!")
          '
      
      - name: Send error to Telegram
        if: failure()
        run: |
          python -c '
          import requests
          import datetime
          import os
          TOKEN = "'"${{ secrets.TELEGRAM_BOT_TOKEN }}"'"
          CHAT_ID = "'"${{ secrets.TELEGRAM_CHAT_ID }}"'"
          if TOKEN != "" and CHAT_ID != "":
              now = datetime.datetime.now().strftime("%Y/%m/%d %H:%M")
              msg = f"❌ تطبیق شغلی v7 (Multi-Site) در تاریخ {now} با خطا مواجه شد!"
              requests.post(
                  f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                  data={"chat_id": CHAT_ID, "text": msg}
              )
              print("✅ پیام خطا به تلگرام ارسال شد.")
          else:
              print("⚠️ توکن یا آیدی تلگرام تنظیم نشده است!")
          '